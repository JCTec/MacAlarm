name: MacAlarm

# Generated Xcode project spec (XcodeGen). The SwiftPM package (Package.swift) is
# the single source of truth for all code; this only defines the macOS .app shell
# that links the MacAlarmAppSupport library so you can build + run in Xcode.
#
#   brew install xcodegen        # one-time
#   xcodegen generate            # (re)creates MacAlarm.xcodeproj
#   open MacAlarm.xcodeproj      # select the "MacAlarm" scheme, then Cmd+R

options:
  bundleIdPrefix: com.jctec
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  MacAlarm:
    path: .

targets:
  MacAlarm:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/MacAlarmApp
      - path: DesignAssets/AppIcon/MacAlarm.icns
        buildPhase: resources
    dependencies:
      - package: MacAlarm
        product: MacAlarmAppSupport
    settings:
      base:
        PRODUCT_NAME: MacAlarm
        PRODUCT_BUNDLE_IDENTIFIER: com.jctec.macalarm
        INFOPLIST_FILE: Xcode/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        # Mac App Store requires App Sandbox on every executable in the bundle.
        CODE_SIGN_ENTITLEMENTS: Xcode/MacAlarm.entitlements
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        # Automatic signing for local + Archive / App Store Connect upload.
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
        DEVELOPMENT_TEAM: S8662L649U
      configs:
        # Emit dSYMs for the main app binary on Release / Archive. Helper dSYMs
        # are copied into the archive by scripts/xcode-copy-helpers.sh.
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    postCompileScripts:
      - name: Bundle helper executables (macalarm-agent, macalarmctl)
        script: '"$SRCROOT/scripts/xcode-copy-helpers.sh"'
        basedOnDependencyAnalysis: false

# Canonical scheme. Run THIS ("MacAlarm") — it launches the MacAlarm.app bundle.
# Do NOT run the auto-generated "MacAlarmApp" scheme: that is the raw SwiftPM
# executable and launches unbundled, which crashes at UNUserNotificationCenter
# .current() with "bundleProxyForCurrentProcess is nil".
schemes:
  MacAlarm:
    build:
      targets:
        MacAlarm: all
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
