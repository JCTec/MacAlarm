name: CI

on:
  push:
    branches: ["main", "release/**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-package:
    name: Build, Test, Package
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (Swift 6)
        run: |
          # Pin the newest installed Xcode so the build never falls back to an
          # older default toolchain than the package's Swift 6 requirement.
          latest="$(printf '%s\n' /Applications/Xcode_*.app | sort -V | tail -n1)"
          if [ -d "$latest" ]; then
            sudo xcode-select -switch "$latest/Contents/Developer"
          fi

      - name: Show Apple Toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Install Tools
        run: |
          # The SwiftUI boundary checks in verify-release.sh use ripgrep, which
          # is not guaranteed on the GitHub macOS runner image.
          command -v rg >/dev/null 2>&1 || brew install ripgrep
          rg --version

      - name: Verify Release
        run: ./scripts/verify-release.sh

      - name: Package And Audit DMG
        env:
          MACALARM_SKIP_RELEASE_BUILD: "1"
          MACALARM_DMG_FINDER_LAYOUT: skip
        run: |
          ./scripts/package-dmg.sh
          ./scripts/audit-distribution.sh

      - name: Upload Local Artifacts
        # Release-branch runs are gate-only; artifacts come from the tagged
        # Release workflow.
        if: ${{ !startsWith(github.ref, 'refs/heads/release/') }}
        uses: actions/upload-artifact@v4
        with:
          name: MacAlarm-local-artifacts
          if-no-files-found: error
          path: |
            dist/MacAlarm-*.zip
            dist/MacAlarm-*.zip.sha256
            dist/MacAlarm-*.dmg
            dist/MacAlarm-*.dmg.sha256
            dist/INSTALLER.md
