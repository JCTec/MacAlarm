name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Weekly, Monday 04:23 UTC.
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  security-events: write
  actions: read
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (Swift)
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (Swift 6)
        run: |
          # macos-14 defaults to Xcode 15 / Swift 5.10, but the package requires
          # Swift 6 tools. Select the newest installed Xcode.
          latest="$(printf '%s\n' /Applications/Xcode_*.app | sort -V | tail -n1)"
          if [ -d "$latest" ]; then
            sudo xcode-select -switch "$latest/Contents/Developer"
          fi
          swift --version

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          build-mode: manual

      - name: Build
        run: swift build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:swift"
